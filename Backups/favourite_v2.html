<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Favourite Pokemon</title>
  <style>
    :root {
      --kauri-blue: #5476c2;
      --kauri-bluelight: #e5eaf6;
      --kauri-bluefaint: #f4f6fc;
      --kauri-grey: #f6f6f6;
      --kauri-darkgrey: #bebebe;
      --shiny-gold: #d6b34a;
      --header-height: 68px;
      --success-bg: #eef6ed;
      --success-border: #bfd8b9;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      color: #111;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid #e7ebf5;
      backdrop-filter: blur(10px);
    }

    .app-title {
      margin: 0;
      font-size: 24px;
      font-weight: normal;
      font-style: italic;
      color: var(--kauri-blue);
      letter-spacing: 0.02em;
      opacity: 0.7;
      text-align: left;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    button,
    select {
      font: inherit;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
      background: var(--kauri-bluelight);
      color: #000;
      border-radius: 8px;
      outline: none;
      border: 1px solid var(--kauri-blue);
      font-weight: 650;
      transition: background 250ms ease, color 250ms ease, transform 120ms ease, border-color 250ms ease, box-shadow 250ms ease;
    }

    button:hover {
      background: var(--kauri-blue);
      color: #fff;
    }

    button:active {
      transform: translateY(1px);
    }

    button.ghost {
      background: #fff;
      color: var(--kauri-blue);
    }

    button.danger {
      background: #fff;
      color: #b00020;
      border-color: #f0c0c0;
    }

    button.danger:hover {
      background: #b00020;
      color: #fff;
      border-color: #b00020;
    }

    .header-actions button.is-active,
    .segmented button.is-active,
    .select-card.is-selected {
      background: var(--kauri-blue);
      color: #fff;
      box-shadow: 0 8px 24px rgba(84, 118, 194, 0.18);
    }

    #main {
      padding: 14px;
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .segmented {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .favourites-wrap,
    .categories-wrap,
    .choices-wrap {
      max-width: 1220px;
      margin: 0 auto;
    }

    .category,
    .choice-category,
    .choice-top-block {
      width: 100%;
      max-width: 1350px;
      margin: 0 auto 14px auto;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 16px 10px 10px 10px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h2 {
      margin: 2em 0 1em 0;
      font-size: 16px;
      font-style: italic;
      font-weight: 400;
      text-transform: uppercase;
      text-align: center;
      color: var(--kauri-blue);
    }

    .category-head,
    .choice-category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 12px 0;
    }

    .choice-category>summary {
      list-style: none;
      cursor: pointer;
    }

    .choice-category>summary::-webkit-details-marker {
      display: none;
    }

    h3 {
      margin: 0;
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      text-align: center;
      color: var(--kauri-blue);
    }

    h4,
    .subgroup-title {
      position: relative;
      margin: 14px 0 10px 0;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      color: #111;
      letter-spacing: 0.08em;
      opacity: 0.75;
    }

    h4 span,
    .subgroup-title span {
      display: inline-block;
      position: relative;
      padding: 0 10px;
      background: #fff;
      z-index: 2;
    }

    h4:before,
    .subgroup-title:before {
      display: block;
      position: absolute;
      content: " ";
      width: 100%;
      height: 1px;
      background: #ccc;
      margin: 0.8em 0 0 0;
      transform: translateY(-2px);
      z-index: 0;
    }

    .criteria-stack,
    .choice-criteria,
    .choice-top-criteria,
    .preview-criteria {
      margin-bottom: 14px;
    }

    .criteria-heading,
    .choice-criteria-heading,
    .choice-top-heading,
    .preview-criteria-heading {
      margin: 0 0 8px 0;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      color: var(--kauri-blue);
    }

    .preview-criteria,
    .choice-criteria {
      display: inline-block;
      padding: 20px;
    }

    .variant-label {
      margin: 10px 0 6px 0;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      color: #666;
    }

    .pokemon-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .poke-card,
    .select-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 82px;
      padding: 0 0 10px 0;
      border-radius: 10px;
      background: var(--kauri-grey);
      border: 1px solid #ececec;
      overflow: hidden;
      transition: border-color 250ms ease, box-shadow 250ms ease, transform 120ms ease;
    }

    .select-card {
      cursor: pointer;
      position: relative;
    }

    .poke-card:hover,
    .select-card:hover {
      border-color: var(--kauri-blue);
      box-shadow: 0 10px 26px rgba(84, 118, 194, 0.12);
    }

    .poke-card.top_fav {
      border-color: rgba(214, 179, 74, 0.9);
      box-shadow: 0 10px 26px rgba(214, 179, 74, 0.18);
      background: linear-gradient(to bottom, #faf8ef, var(--kauri-grey));
    }

    .poke-card.top_fav .criteria,
    .poke-card.top_fav .poke-name {
      color: #7a5d11;
    }

    .select-card.is-selected {
      border-color: var(--kauri-blue);
    }

    .select-card.is-selected .select-card-name,
    .select-card.is-selected .select-card-meta {
      color: #fff;
    }

    .poke-icon,
    .select-card-icon {
      position: relative;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      width: 100%;
    }

    .poke-icon[data-shiny="yes"]:before,
    .select-card-icon[data-shiny="yes"]:before {
      display: block;
      position: absolute;
      content: " ";
      width: 20px;
      height: 20px;
      background-image: url(images/shiny_icon.png);
      background-size: contain;
      top: 5px;
      left: 5px;
      z-index: 1;
      opacity: 0.2;
    }

    .poke-card.top_fav .poke-icon:after {
      display: block;
      position: absolute;
      content: "★";
      top: 4px;
      right: 6px;
      z-index: 2;
      font-size: 14px;
      line-height: 1;
      color: var(--shiny-gold);
      opacity: 0.9;
    }

    .poke-icon img,
    .select-card-icon img {
      position: relative;
      width: 80px;
      height: 80px;
      image-rendering: auto;
      display: block;
    }

    .poke-meta,
    .select-card-meta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
      padding: 0 10px;
    }

    .criteria,
    .select-card-meta {
      font-size: 9px;
      font-weight: 600;
      color: #111;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .poke-name,
    .select-card-name {
      font-size: 12px;
      color: var(--kauri-blue);
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: capitalize;
      text-align: center;
    }

    .empty-note,
    .helper-note {
      color: #666;
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }

    .helper-note {
      padding-top: 2px;
      padding-bottom: 14px;
    }

    .categories-editor {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    details.cat-editor {
      border: 1px solid #e8e8e8;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    details.cat-editor[open] {
      border-color: #dfe6f6;
    }

    details.cat-editor.heading-cat {
      box-shadow: none;
      border:none;
      background: transparent;
    }

    details.cat-editor.heading-cat summary {
      background: transparent;
    }

    .cat-editor summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--kauri-bluefaint);
      user-select: none;
    }

    .cat-editor summary::-webkit-details-marker {
      display: none;
    }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .summary-type {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--kauri-blue);
      border: 1px solid #cfdaf4;
      background: #fff;
      border-radius: 999px;
      padding: 4px 8px;
      flex: 0 0 auto;
    }

    .summary-title {
      font-size: 14px;
      color: #1d2f63;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .summary-actions button {
      padding: 6px 8px;
      font-size: 12px;
      min-width: 32px;
      line-height: 1;
    }

    .cat-editor-body {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .cat-editor-top {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field-grow {
      flex: 1;
      min-width: 260px;
    }

    .field-short {
      width: 180px;
      flex: 0 0 auto;
    }

    label {
      display: block;
      position: relative;
      margin-bottom: -5px;
      font-size: 0.6em;
      color: var(--kauri-blue);
      z-index: 1;
      background-color: #fff;
      width: fit-content;
      padding: 0 6px 0 0;
      text-transform: uppercase;
      font-weight: normal;
      letter-spacing: 0.08em;
    }

    input,
    textarea,
    select.editor-select {
      border: 1px solid var(--kauri-darkgrey);
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      width: 100%;
      background: #fff;
    }

    textarea {
      height: 320px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.3;
    }

    input:focus,
    textarea:focus,
    select.editor-select:focus {
      outline: none;
      border-color: var(--kauri-blue);
      box-shadow: 0 0 0 2px var(--kauri-bluelight);
    }

    .preview-area {
      display: grid;
      gap: 14px;
      padding-top: 2px;
    }

    .preview-block {
      border: 1px solid #ececec;
      border-radius: 12px;
      background: #fafbfd;
      padding: 12px;
    }

    .preview-label,
    .top-fav-label {
      margin: 0 0 10px 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--kauri-blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .preview-block .subgroup-title span {
      background: #fafbfd;
    }

    .choice-category-body {
      display: grid;
      gap: 14px;
    }

    .choice-subgroup,
    .choice-top-criteria {
      border: 1px solid #edf0f7;
      border-radius: 12px;
      padding: 12px;
      background: #fafbfd;
    }

    .choice-top-block {
      background: #fffdf7;
      border-color: #f1e3b0;
    }

    .choice-top-block .subgroup-title span {
      background: #fffdf7;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid #d5dff5;
      color: var(--kauri-blue);
      background: #fff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .choice-meta-row {
      display: flex;
      justify-content: center;
      margin: 0 0 12px 0;
    }

    .save-flash {
      background: var(--success-bg) !important;
      border-color: var(--success-border) !important;
      color: #234d20 !important;
    }

    @media (max-width: 760px) {
      .app-header {
        align-items: stretch;
        flex-direction: column;
      }

      .app-title {
        text-align: center;
        white-space: normal;
      }

      .header-actions,
      .toolbar {
        justify-content: center;
      }

      .cat-editor summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .cat-editor-top {
        align-items: stretch;
      }

      .field-short {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <h1 class="app-title">My Favourite Pokemon</h1>
    <div class="header-actions">
      <button id="btn-view-favourites" class="is-active" type="button">Favourites</button>
      <button id="btn-view-choices" type="button">Choices</button>
      <button id="btn-view-categories" type="button">Categories</button>
    </div>
  </header>

  <main id="main">
    <section id="favourites-view" class="view is-active">
      <div class="favourites-wrap">
        <div class="toolbar">
          <div class="segmented" aria-label="Favourites variant">
            <button id="btn-favourites-regular" class="is-active" type="button">Regular</button>
            <button id="btn-favourites-shiny" type="button">Shiny</button>
          </div>
        </div>
        <div id="favourites-render"></div>
      </div>
    </section>

    <section id="choices-view" class="view">
      <div class="choices-wrap">
        <div class="toolbar">
          <button id="btn-save-choices" class="ghost" type="button" title="Downloads a favourite.js file">Save</button>
          <button id="btn-reset-choices" class="danger" type="button"
            title="Resets to favourite.js defaults">Reset</button>
        </div>
        <div id="choices-render"></div>
      </div>
    </section>

    <section id="categories-view" class="view">
      <div class="categories-wrap">
        <div class="toolbar">
          <button id="btn-add-category" type="button">Add Category</button>
          <button id="btn-add-heading" type="button">Add Heading</button>
          <button id="btn-save-categories" class="ghost" type="button"
            title="Downloads a favourite.js file">Save</button>
          <button id="btn-reset-categories" class="danger" type="button"
            title="Resets to favourite.js defaults">Reset</button>
        </div>
        <div id="categories-editor" class="categories-editor"></div>
      </div>
    </section>
  </main>

  <script src="favourite.js"></script>
  <script>
    function uid() {
      return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function structuredCloneFallback(value) {
      if (typeof structuredClone === "function") return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function slugifyPokemon(pokemonRaw) {
      return String(pokemonRaw || "")
        .trim()
        .toLowerCase()
        .replace(/[|'’]/g, "")
        .replace(/\s+/g, "-");
    }

    function cleanPokemonName(rawValue) {
      return String(rawValue || "")
        .trim()
        .replace(/\*+$/g, "")
        .replace(/-s$/i, "")
        .trim();
    }

    function normalisePokemon(rawValue) {
      const displayName = cleanPokemonName(rawValue);
      if (!displayName) return null;
      return {
        displayName,
        pokemonSlug: slugifyPokemon(displayName)
      };
    }

    function uniquePokemonList(list) {
      const seen = new Set();
      const output = [];
      for (const item of list) {
        if (!item || !item.pokemonSlug) continue;
        if (seen.has(item.pokemonSlug)) continue;
        seen.add(item.pokemonSlug);
        output.push(item);
      }
      return output;
    }

    function parsePokemonCsv(value) {
      return uniquePokemonList(
        String(value || "")
          .split(",")
          .map(part => normalisePokemon(part))
      );
    }

    function makeEntryKey(subgroupTitle, criteria) {
      return `${String(subgroupTitle || "").trim()}__${String(criteria || "").trim()}`;
    }

    function parseCategoryStructure(text) {
      const lines = String(text || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      const sections = [];
      let currentSection = { title: "", entries: [] };

      function pushCurrentSectionIfNeeded() {
        if (currentSection.entries.length || currentSection.title) {
          sections.push(currentSection);
        }
      }

      for (const line of lines) {
        const headingMatch = line.match(/^---\s*(.+?)\s*---$/);
        if (headingMatch) {
          pushCurrentSectionIfNeeded();
          currentSection = { title: (headingMatch[1] || "").trim(), entries: [] };
          continue;
        }

        const parts = line.split("|").map(part => part.trim());
        if (parts.length < 2) continue;

        const criteria = parts[0];
        if (!criteria) continue;

        let pokemonList = [];
        if (parts.length >= 3) {
          pokemonList = uniquePokemonList([
            normalisePokemon(parts[1]),
            normalisePokemon(parts[2])
          ]);
        } else {
          pokemonList = parsePokemonCsv(parts[1]);
        }

        if (!pokemonList.length) continue;

        currentSection.entries.push({
          criteria,
          key: makeEntryKey(currentSection.title, criteria),
          pokemon: pokemonList
        });
      }

      pushCurrentSectionIfNeeded();
      return sections;
    }

    function normaliseLoadedData(source) {
      if (Array.isArray(source)) {
        return {
          version: 2,
          items: source.map(item => ({
            id: String(item.id || uid()),
            type: item.type === "heading" ? "heading" : "category",
            title: String(item.title || "").trim(),
            text: String(item.text || ""),
            topFavourite: "No"
          })),
          selections: {},
          topSelections: {}
        };
      }

      const items = Array.isArray(source && source.items) ? source.items : [];
      return {
        version: 2,
        items: items.map(item => ({
          id: String(item.id || uid()),
          type: item.type === "heading" ? "heading" : "category",
          title: String(item.title || "").trim(),
          text: String(item.text || ""),
          topFavourite: item.type === "heading" ? "No" : (String(item.topFavourite || "No") === "Yes" ? "Yes" : "No")
        })),
        selections: source && typeof source.selections === "object" && source.selections ? structuredCloneFallback(source.selections) : {},
        topSelections: source && typeof source.topSelections === "object" && source.topSelections ? structuredCloneFallback(source.topSelections) : {}
      };
    }

    const LOADED_DATA = normaliseLoadedData(window.FAVOURITE_POKEMON_DATA);

    const DEFAULT_DATA = {
      version: 2,
      items: LOADED_DATA.items.length ? LOADED_DATA.items : [
        {
          id: uid(),
          type: "category",
          title: "Starters",
          topFavourite: "Yes",
          text: [
            "--- Kanto ---",
            "1st Evo | Bulbasaur, Charmander, Squirtle",
            "--- Johto ---",
            "1st Evo | Chikorita, Cyndaquil, Totodile"
          ].join("\n")
        }
      ],
      selections: LOADED_DATA.selections,
      topSelections: LOADED_DATA.topSelections
    };

    function exportAsFavouriteJS(state) {
      const payload = {
        version: 2,
        items: state.items.map(item => ({
          id: item.id,
          type: item.type,
          title: item.title,
          text: item.text,
          ...(item.type === "category" ? { topFavourite: item.topFavourite || "No" } : {})
        })),
        selections: state.selections,
        topSelections: state.topSelections
      };
      return `// Generated by My Favourite Pokemon\nwindow.FAVOURITE_POKEMON_DATA = ${JSON.stringify(payload, null, 2)};\n`;
    }

    function downloadTextFile(filename, text) {
      const blob = new Blob([text], { type: "text/javascript;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function resetData() {
      const base = location.href.split("?")[0];
      location.href = base + "?v=" + Date.now();
    }

    function iconPath(pokemonSlug, isShiny) {
      const file = isShiny ? "shiny.png" : "regular.png";
      return `images/pokemon/${pokemonSlug}/${file}`;
    }

    const state = {
      items: structuredCloneFallback(DEFAULT_DATA.items),
      selections: structuredCloneFallback(DEFAULT_DATA.selections || {}),
      topSelections: structuredCloneFallback(DEFAULT_DATA.topSelections || {}),
      currentView: "favourites",
      favouritesVariant: "regular"
    };

    const favouritesViewEl = document.getElementById("favourites-view");
    const choicesViewEl = document.getElementById("choices-view");
    const categoriesViewEl = document.getElementById("categories-view");

    const favouritesRenderEl = document.getElementById("favourites-render");
    const choicesRenderEl = document.getElementById("choices-render");
    const categoriesEditorEl = document.getElementById("categories-editor");

    const btnViewFavourites = document.getElementById("btn-view-favourites");
    const btnViewChoices = document.getElementById("btn-view-choices");
    const btnViewCategories = document.getElementById("btn-view-categories");
    const btnFavouritesRegular = document.getElementById("btn-favourites-regular");
    const btnFavouritesShiny = document.getElementById("btn-favourites-shiny");

    function getCategoryItems() {
      return state.items.filter(item => item.type === "category");
    }

    function getSelectionBucket(categoryId) {
      if (!state.selections[categoryId] || typeof state.selections[categoryId] !== "object") {
        state.selections[categoryId] = {};
      }
      return state.selections[categoryId];
    }

    function getTopSelectionBucket(categoryId) {
      if (!state.topSelections[categoryId] || typeof state.topSelections[categoryId] !== "object") {
        state.topSelections[categoryId] = {};
      }
      return state.topSelections[categoryId];
    }

    function getSelectedSlug(categoryId, entryKey, variant) {
      const bucket = state.selections[categoryId];
      return bucket && bucket[entryKey] ? bucket[entryKey][variant] || "" : "";
    }

    function setSelectedSlug(categoryId, entryKey, variant, pokemonSlug) {
      const bucket = getSelectionBucket(categoryId);
      if (!bucket[entryKey] || typeof bucket[entryKey] !== "object") {
        bucket[entryKey] = { regular: "", shiny: "" };
      }
      bucket[entryKey][variant] = pokemonSlug;
      pruneTopSelectionsForCategory(categoryId);
    }

    function getTopSelectedSlug(categoryId, criteria, variant) {
      const bucket = state.topSelections[categoryId];
      return bucket && bucket[criteria] ? bucket[criteria][variant] || "" : "";
    }

    function setTopSelectedSlug(categoryId, criteria, variant, pokemonSlug) {
      const bucket = getTopSelectionBucket(categoryId);
      if (!bucket[criteria] || typeof bucket[criteria] !== "object") {
        bucket[criteria] = { regular: "", shiny: "" };
      }
      bucket[criteria][variant] = pokemonSlug;
    }

    function pruneTopSelectionsForCategory(categoryId) {
      const category = state.items.find(item => item.id === categoryId && item.type === "category");
      if (!category) return;
      if (category.topFavourite !== "Yes") {
        delete state.topSelections[categoryId];
        return;
      }

      const topGroups = getTopFavouriteGroups(category);
      const validCriteria = new Set(topGroups.map(group => group.criteria));
      const bucket = state.topSelections[categoryId];
      if (!bucket) return;

      Object.keys(bucket).forEach(criteria => {
        if (!validCriteria.has(criteria)) {
          delete bucket[criteria];
          return;
        }
        const group = topGroups.find(item => item.criteria === criteria);
        if (!group) return;
        ["regular", "shiny"].forEach(variant => {
          const validSlugs = new Set(group[variant].map(p => p.pokemonSlug));
          if (!validSlugs.has(bucket[criteria][variant])) {
            bucket[criteria][variant] = "";
          }
        });
      });
    }

    function getPokemonBySlug(list, slug) {
      return list.find(item => item.pokemonSlug === slug) || null;
    }

    function getTopFavouriteGroups(category) {
      const sections = parseCategoryStructure(category.text);
      const criteriaMap = new Map();

      for (const section of sections) {
        for (const entry of section.entries) {
          const regularSlug = getSelectedSlug(category.id, entry.key, "regular");
          const shinySlug = getSelectedSlug(category.id, entry.key, "shiny");
          const regularPokemon = getPokemonBySlug(entry.pokemon, regularSlug);
          const shinyPokemon = getPokemonBySlug(entry.pokemon, shinySlug);

          if (!criteriaMap.has(entry.criteria)) {
            criteriaMap.set(entry.criteria, { criteria: entry.criteria, regular: [], shiny: [] });
          }

          const group = criteriaMap.get(entry.criteria);
          if (regularPokemon) group.regular.push(regularPokemon);
          if (shinyPokemon) group.shiny.push(shinyPokemon);
        }
      }

      return Array.from(criteriaMap.values())
        .map(group => ({
          criteria: group.criteria,
          regular: uniquePokemonList(group.regular),
          shiny: uniquePokemonList(group.shiny)
        }))
        .filter(group => group.regular.length > 1 || group.shiny.length > 1);
    }

    function setView(viewName) {
      state.currentView = viewName;
      favouritesViewEl.classList.toggle("is-active", viewName === "favourites");
      choicesViewEl.classList.toggle("is-active", viewName === "choices");
      categoriesViewEl.classList.toggle("is-active", viewName === "categories");
      btnViewFavourites.classList.toggle("is-active", viewName === "favourites");
      btnViewChoices.classList.toggle("is-active", viewName === "choices");
      btnViewCategories.classList.toggle("is-active", viewName === "categories");
    }

    function setFavouritesVariant(variant) {
      state.favouritesVariant = variant === "shiny" ? "shiny" : "regular";
      btnFavouritesRegular.classList.toggle("is-active", state.favouritesVariant === "regular");
      btnFavouritesShiny.classList.toggle("is-active", state.favouritesVariant === "shiny");
      renderFavouritesView();
    }

    btnViewFavourites.addEventListener("click", () => setView("favourites"));
    btnViewChoices.addEventListener("click", () => setView("choices"));
    btnViewCategories.addEventListener("click", () => setView("categories"));
    btnFavouritesRegular.addEventListener("click", () => setFavouritesVariant("regular"));
    btnFavouritesShiny.addEventListener("click", () => setFavouritesVariant("shiny"));

    function createImageElement(pokemonSlug, isShiny, altText) {
      const img = document.createElement("img");
      img.loading = "lazy";
      img.alt = altText;
      img.src = iconPath(pokemonSlug, isShiny);
      img.onerror = () => {
        img.onerror = null;
        img.src = "images/pokemon/---/regular.png";
      };
      return img;
    }

    function createFavouriteCard(criteriaText, pokemonData, isShiny, isTopFav) {
      const card = document.createElement("div");
      card.className = "poke-card";
      if (isTopFav) card.classList.add("top_fav");

      const icon = document.createElement("div");
      icon.className = "poke-icon";
      icon.dataset.shiny = isShiny ? "yes" : "no";
      icon.appendChild(createImageElement(pokemonData.pokemonSlug, isShiny, pokemonData.displayName));

      const meta = document.createElement("div");
      meta.className = "poke-meta";

      const criteria = document.createElement("div");
      criteria.className = "criteria";
      criteria.textContent = criteriaText;

      const name = document.createElement("div");
      name.className = "poke-name";
      name.textContent = pokemonData.displayName;

      meta.appendChild(criteria);
      meta.appendChild(name);
      card.appendChild(icon);
      card.appendChild(meta);
      return card;
    }

    function createSelectCard(pokemonData, variant, isSelected, metaText, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "select-card";
      if (isSelected) button.classList.add("is-selected");
      button.addEventListener("click", onClick);

      const icon = document.createElement("div");
      icon.className = "select-card-icon";
      icon.dataset.shiny = variant === "shiny" ? "yes" : "no";
      icon.appendChild(createImageElement(pokemonData.pokemonSlug, variant === "shiny", pokemonData.displayName));

      const metaWrap = document.createElement("div");
      metaWrap.className = "select-card-meta-wrap";

      const meta = document.createElement("div");
      meta.className = "select-card-meta";
      meta.textContent = metaText || "";

      const name = document.createElement("div");
      name.className = "select-card-name";
      name.textContent = pokemonData.displayName;

      metaWrap.appendChild(meta);
      metaWrap.appendChild(name);
      button.appendChild(icon);
      button.appendChild(metaWrap);
      return button;
    }

    function makeRow() {
      const row = document.createElement("div");
      row.className = "pokemon-row";
      return row;
    }

    function appendSubgroupHeading(targetEl, text, background) {
      if (!text) return;
      const heading = document.createElement("div");
      heading.className = "subgroup-title";
      const span = document.createElement("span");
      span.textContent = text;
      if (background) span.style.background = background;
      heading.appendChild(span);
      targetEl.appendChild(heading);
    }

    function renderPreviewStructure(targetEl, sections) {
      if (!sections.length) {
        const empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = "No valid entries yet.";
        targetEl.appendChild(empty);
        return;
      }

      for (const section of sections) {
        if (section.title) appendSubgroupHeading(targetEl, section.title, "#fafbfd");
        for (const entry of section.entries) {
          const block = document.createElement("div");
          block.className = "preview-criteria";

          const heading = document.createElement("div");
          heading.className = "preview-criteria-heading";
          heading.textContent = entry.criteria;
          block.appendChild(heading);

          const row = makeRow();
          entry.pokemon.forEach(pokemon => {
            row.appendChild(createFavouriteCard(entry.criteria, pokemon, false, false));
          });
          block.appendChild(row);
          targetEl.appendChild(block);
        }
      }
    }

    function renderCategoriesView() {
      categoriesEditorEl.innerHTML = "";

      state.items.forEach((item, index) => {
        const details = document.createElement("details");
        details.className = "cat-editor";
        if (item.type === "heading") {
          details.classList.add("heading-cat");
        }

        const summary = document.createElement("summary");
        const summaryLeft = document.createElement("div");
        summaryLeft.className = "summary-left";

        const summaryType = document.createElement("span");
        summaryType.className = "summary-type";
        summaryType.textContent = item.type === "heading" ? "Heading" : "Category";

        const summaryTitle = document.createElement("span");
        summaryTitle.className = "summary-title";
        summaryTitle.textContent = item.title.trim() || (item.type === "heading" ? "Untitled Heading" : "Untitled Category");

        summaryLeft.appendChild(summaryType);
        summaryLeft.appendChild(summaryTitle);

        const summaryActions = document.createElement("div");
        summaryActions.className = "summary-actions";

        const moveUpButton = document.createElement("button");
        moveUpButton.type = "button";
        moveUpButton.textContent = "↑";
        moveUpButton.disabled = index === 0;
        moveUpButton.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const targetIndex = index - 1;
          if (targetIndex < 0) return;
          [state.items[index], state.items[targetIndex]] = [state.items[targetIndex], state.items[index]];
          renderAll();
        });

        const moveDownButton = document.createElement("button");
        moveDownButton.type = "button";
        moveDownButton.textContent = "↓";
        moveDownButton.disabled = index === state.items.length - 1;
        moveDownButton.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const targetIndex = index + 1;
          if (targetIndex >= state.items.length) return;
          [state.items[index], state.items[targetIndex]] = [state.items[targetIndex], state.items[index]];
          renderAll();
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "danger";
        deleteButton.textContent = "✕";
        deleteButton.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const removed = state.items.splice(index, 1)[0];
          if (removed && removed.type === "category") {
            delete state.selections[removed.id];
            delete state.topSelections[removed.id];
          }
          renderAll();
        });

        summaryActions.appendChild(moveUpButton);
        summaryActions.appendChild(moveDownButton);
        summaryActions.appendChild(deleteButton);

        summary.appendChild(summaryLeft);
        summary.appendChild(summaryActions);
        details.appendChild(summary);

        const body = document.createElement("div");
        body.className = "cat-editor-body";

        const top = document.createElement("div");
        top.className = "cat-editor-top";

        const titleWrap = document.createElement("div");
        titleWrap.className = "field-grow";
        const titleLabel = document.createElement("label");
        titleLabel.textContent = item.type === "heading" ? "Heading" : "Category Title";
        const titleInput = document.createElement("input");
        titleInput.type = "text";
        titleInput.value = item.title || "";
        titleInput.placeholder = item.type === "heading" ? "e.g. Overall Favourites" : "e.g. Starters";
        titleInput.addEventListener("input", () => {
          item.title = titleInput.value;
          summaryTitle.textContent = titleInput.value.trim() || (item.type === "heading" ? "Untitled Heading" : "Untitled Category");
          renderFavouritesView();
          renderChoicesView();
        });
        titleWrap.appendChild(titleLabel);
        titleWrap.appendChild(titleInput);
        top.appendChild(titleWrap);

        if (item.type === "category") {
          const topWrap = document.createElement("div");
          topWrap.className = "field-short";
          const topLabel = document.createElement("label");
          topLabel.textContent = "Top Favourite";
          const topSelect = document.createElement("select");
          topSelect.className = "editor-select";
          ["No", "Yes"].forEach(value => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            option.selected = (item.topFavourite || "No") === value;
            topSelect.appendChild(option);
          });
          topSelect.addEventListener("change", () => {
            item.topFavourite = topSelect.value === "Yes" ? "Yes" : "No";
            pruneTopSelectionsForCategory(item.id);
            renderAll();
          });
          topWrap.appendChild(topLabel);
          topWrap.appendChild(topSelect);
          top.appendChild(topWrap);
        }

        body.appendChild(top);

        if (item.type === "category") {
          const textWrap = document.createElement("div");
          const textLabel = document.createElement("label");
          textLabel.textContent = "Entries";
          const textarea = document.createElement("textarea");
          textarea.value = item.text || "";
          textarea.placeholder = [
            "--- Kanto ---",
            "1st Evo | Bulbasaur, Charmander, Squirtle",
            "2nd Evo | Ivysaur, Charmeleon, Wartortle",
            "--- Johto ---",
            "1st Evo | Chikorita, Cyndaquil, Totodile"
          ].join("\n");
          textWrap.appendChild(textLabel);
          textWrap.appendChild(textarea);
          body.appendChild(textWrap);

          const helper = document.createElement("div");
          helper.className = "helper-note";
          helper.textContent = "Use subgroup headings like --- Kanto ---. Each entry line should be Criteria | Pokemon 1, Pokemon 2, Pokemon 3.";
          body.appendChild(helper);

          const previewArea = document.createElement("div");
          previewArea.className = "preview-area";
          const previewBlock = document.createElement("div");
          previewBlock.className = "preview-block";
          const previewLabel = document.createElement("div");
          previewLabel.className = "preview-label";
          previewLabel.textContent = "Preview";
          previewBlock.appendChild(previewLabel);
          previewArea.appendChild(previewBlock);
          body.appendChild(previewArea);

          function refreshPreview() {
            previewBlock.innerHTML = "";
            previewBlock.appendChild(previewLabel);
            renderPreviewStructure(previewBlock, parseCategoryStructure(textarea.value));
          }

          textarea.addEventListener("input", () => {
            item.text = textarea.value;
            pruneTopSelectionsForCategory(item.id);
            refreshPreview();
            renderChoicesView();
            renderFavouritesView();
          });

          refreshPreview();
        }

        details.appendChild(body);
        categoriesEditorEl.appendChild(details);
      });
    }

    function renderFavouritesView() {
      favouritesRenderEl.innerHTML = "";
      const activeVariant = state.favouritesVariant;
      let hasAnyContent = false;

      for (const item of state.items) {
        const title = item.title.trim() || (item.type === "heading" ? "Untitled Heading" : "Untitled Category");

        if (item.type === "heading") {
          const h2 = document.createElement("h2");
          h2.textContent = title;
          favouritesRenderEl.appendChild(h2);
          continue;
        }

        const sections = parseCategoryStructure(item.text);
        const topGroups = getTopFavouriteGroups(item);

        const categoryEl = document.createElement("div");
        categoryEl.className = "category";

        const head = document.createElement("div");
        head.className = "category-head";
        const h3 = document.createElement("h3");
        h3.textContent = title;
        head.appendChild(h3);
        categoryEl.appendChild(head);

        let categoryHasCards = false;

        for (const section of sections) {
          if (section.title) appendSubgroupHeading(categoryEl, section.title, "#fff");
          const row = makeRow();

          for (const entry of section.entries) {
            const selectedSlug = getSelectedSlug(item.id, entry.key, activeVariant);
            const selectedPokemon = getPokemonBySlug(entry.pokemon, selectedSlug);
            if (!selectedPokemon) continue;

            const topSelectedSlug = getTopSelectedSlug(item.id, entry.criteria, activeVariant);
            const isTopFav = topSelectedSlug && topSelectedSlug === selectedPokemon.pokemonSlug;
            row.appendChild(createFavouriteCard(entry.criteria, selectedPokemon, activeVariant === "shiny", isTopFav));
            categoryHasCards = true;
            hasAnyContent = true;
          }

          if (row.childElementCount > 0) categoryEl.appendChild(row);
        }

        if (!categoryHasCards) {
          const empty = document.createElement("div");
          empty.className = "empty-note";
          empty.textContent = "No favourites selected for this category yet.";
          categoryEl.appendChild(empty);
        }

        favouritesRenderEl.appendChild(categoryEl);
      }

      if (!hasAnyContent) {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = "Choose favourites in the Choices view to populate this page.";
        favouritesRenderEl.appendChild(note);
      }
    }

    function renderChoiceVariantRow(category, entry, variant) {
      const wrapper = document.createElement("div");

      const variantLabel = document.createElement("div");
      variantLabel.className = "variant-label";
      variantLabel.textContent = variant === "regular" ? "Regular" : "Shiny";
      wrapper.appendChild(variantLabel);

      const row = makeRow();
      const selectedSlug = getSelectedSlug(category.id, entry.key, variant);

      entry.pokemon.forEach(pokemon => {
        row.appendChild(createSelectCard(
          pokemon,
          variant,
          selectedSlug === pokemon.pokemonSlug,
          entry.criteria,
          () => {
            setSelectedSlug(category.id, entry.key, variant, pokemon.pokemonSlug);
            renderChoicesView();
            renderFavouritesView();
          }
        ));
      });

      wrapper.appendChild(row);
      return wrapper;
    }

    function renderTopChoiceVariantRow(category, criteria, variant, pokemonList) {
      const wrapper = document.createElement("div");
      const variantLabel = document.createElement("div");
      variantLabel.className = "variant-label";
      variantLabel.textContent = variant === "regular" ? "Regular" : "Shiny";
      wrapper.appendChild(variantLabel);

      if (pokemonList.length < 2) {
        const note = document.createElement("div");
        note.className = "empty-note";
        note.textContent = `Pick more ${variant} favourites in this criteria to unlock top favourite selection.`;
        wrapper.appendChild(note);
        return wrapper;
      }

      const row = makeRow();
      const selectedSlug = getTopSelectedSlug(category.id, criteria, variant);
      pokemonList.forEach(pokemon => {
        row.appendChild(createSelectCard(
          pokemon,
          variant,
          selectedSlug === pokemon.pokemonSlug,
          criteria,
          () => {
            setTopSelectedSlug(category.id, criteria, variant, pokemon.pokemonSlug);
            renderChoicesView();
            renderFavouritesView();
          }
        ));
      });
      wrapper.appendChild(row);
      return wrapper;
    }

    function renderChoicesView() {
      choicesRenderEl.innerHTML = "";

      for (const item of state.items) {
        const title = item.title.trim() || (item.type === "heading" ? "Untitled Heading" : "Untitled Category");

        if (item.type === "heading") {
          const h2 = document.createElement("h2");
          h2.textContent = title;
          choicesRenderEl.appendChild(h2);
          continue;
        }

        const details = document.createElement("details");
        details.className = "choice-category";

        const summary = document.createElement("summary");
        summary.className = "choice-category-head";

        const h3 = document.createElement("h3");
        h3.textContent = title;
        summary.appendChild(h3);

        const pill = document.createElement("div");
        pill.className = "status-pill";
        pill.textContent = `Top Favourite: ${item.topFavourite || "No"}`;
        summary.appendChild(pill);

        details.appendChild(summary);

        const body = document.createElement("div");
        body.className = "choice-category-body";

        const sections = parseCategoryStructure(item.text);
        if (!sections.length) {
          const empty = document.createElement("div");
          empty.className = "empty-note";
          empty.textContent = "No valid category entries yet.";
          body.appendChild(empty);
        } else {
          for (const section of sections) {
            const sectionEl = document.createElement("div");
            sectionEl.className = "choice-subgroup";
            if (section.title) appendSubgroupHeading(sectionEl, section.title, "#fafbfd");

            for (const entry of section.entries) {
              const criteriaEl = document.createElement("div");
              criteriaEl.className = "choice-criteria";

              const criteriaHeading = document.createElement("div");
              criteriaHeading.className = "choice-criteria-heading";
              criteriaHeading.textContent = entry.criteria;
              criteriaEl.appendChild(criteriaHeading);

              criteriaEl.appendChild(renderChoiceVariantRow(item, entry, "regular"));
              criteriaEl.appendChild(renderChoiceVariantRow(item, entry, "shiny"));
              sectionEl.appendChild(criteriaEl);
            }

            body.appendChild(sectionEl);
          }
        }

        if ((item.topFavourite || "No") === "Yes") {
          const topGroups = getTopFavouriteGroups(item);
          if (topGroups.length) {
            const topBlock = document.createElement("div");
            topBlock.className = "choice-top-block";

            appendSubgroupHeading(topBlock, `${title} Top Favourites`, "#fffdf7");

            const topLabel = document.createElement("div");
            topLabel.className = "top-fav-label";
            topLabel.textContent = "Choose the top favourite from your selected favourites with matching criteria.";
            topBlock.appendChild(topLabel);

            topGroups.forEach(group => {
              const groupEl = document.createElement("div");
              groupEl.className = "choice-top-criteria";

              const heading = document.createElement("div");
              heading.className = "choice-top-heading";
              heading.textContent = group.criteria;
              groupEl.appendChild(heading);

              groupEl.appendChild(renderTopChoiceVariantRow(item, group.criteria, "regular", group.regular));
              groupEl.appendChild(renderTopChoiceVariantRow(item, group.criteria, "shiny", group.shiny));
              topBlock.appendChild(groupEl);
            });

            body.appendChild(topBlock);
          }
        }

        details.appendChild(body);
        choicesRenderEl.appendChild(details);
      }
    }

    function flashSaveButtons() {
      [document.getElementById("btn-save-categories"), document.getElementById("btn-save-choices")].forEach(button => {
        const previous = button.textContent;
        button.textContent = "Saved";
        button.classList.add("save-flash");
        setTimeout(() => {
          button.textContent = previous;
          button.classList.remove("save-flash");
        }, 800);
      });
    }

    function saveData() {
      downloadTextFile("favourite.js", exportAsFavouriteJS(state));
      flashSaveButtons();
    }

    document.getElementById("btn-add-category").addEventListener("click", () => {
      state.items.push({
        id: uid(),
        type: "category",
        title: "",
        text: "",
        topFavourite: "No"
      });
      renderAll();
    });

    document.getElementById("btn-add-heading").addEventListener("click", () => {
      state.items.push({
        id: uid(),
        type: "heading",
        title: "",
        text: ""
      });
      renderAll();
    });

    document.getElementById("btn-save-categories").addEventListener("click", saveData);
    document.getElementById("btn-save-choices").addEventListener("click", saveData);
    document.getElementById("btn-reset-categories").addEventListener("click", resetData);
    document.getElementById("btn-reset-choices").addEventListener("click", resetData);

    function renderAll() {
      renderCategoriesView();
      renderChoicesView();
      renderFavouritesView();
      setView(state.currentView);
      setFavouritesVariant(state.favouritesVariant);
    }

    renderAll();
  </script>
</body>

</html>
